<title>Forever · פארק הים, ראשון לציון</title>
<style>
  :root{
    --bg:#0a0f14; --bg2:#10171f; --gold:#c9a86a; --gold-soft:#d8c39a; --ink:#e8eef3;
    --frame-shadow:0 50px 130px -30px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:radial-gradient(120% 90% at 50% 0%, #16202b 0%, var(--bg) 55%, #060a0e 100%);
    color:var(--ink);font-family:"Heebo","Assistant",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
  .progress{position:fixed;top:0;left:0;right:0;height:3px;z-index:60;background:rgba(255,255,255,.05)}
  .progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-soft));box-shadow:0 0 14px rgba(201,168,106,.6);transition:width .15s linear}
  main{display:block}
  .slide{min-height:100svh;height:100svh;display:flex;align-items:center;justify-content:center;
    scroll-snap-align:center;scroll-snap-stop:always;position:relative;padding:clamp(14px,4vh,52px)}
  .frame{position:relative;width:auto;max-width:min(94vw,1640px);max-height:88svh;line-height:0;border-radius:8px;overflow:hidden;
    box-shadow:var(--frame-shadow);opacity:.12;transform:scale(.965) translateY(26px);
    transition:opacity 1.05s cubic-bezier(.16,1,.3,1),transform 1.25s cubic-bezier(.16,1,.3,1);will-change:opacity,transform}
  .slide img{display:block;max-width:min(94vw,1640px);max-height:88svh;width:auto;height:auto}
  .slide.active .frame{opacity:1;transform:none}
  /* video overlay positioned over the photo area of a slide */
  .ytbox{position:absolute;border-radius:10px;overflow:hidden;background:#000;
    box-shadow:0 14px 40px -10px rgba(0,0,0,.55)}
  .ytbox iframe{width:100%;height:100%;border:0;display:block}
  .ytfacade{position:absolute;inset:0;width:100%;height:100%;border:0;padding:0;margin:0;cursor:pointer;background:#000;overflow:hidden;line-height:0}
  .ytfacade .ytthumb{width:100%;height:100%;object-fit:cover;display:block;opacity:.94;transition:opacity .5s ease,transform 7s ease}
  .ytfacade:hover .ytthumb{opacity:1;transform:scale(1.045)}
  .ytfacade .ytplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:78px;height:54px;border-radius:14px;background:rgba(18,18,18,.82);
    display:flex;align-items:center;justify-content:center;transition:background .3s ease,transform .3s ease;box-shadow:0 6px 22px rgba(0,0,0,.4)}
  .ytfacade .ytplay svg{margin-inline-start:3px}
  .ytfacade:hover .ytplay{background:#cc0000;transform:translate(-50%,-50%) scale(1.07)}
  .dots{position:fixed;top:50%;left:22px;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:11px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;border:0;padding:0;cursor:pointer;background:rgba(232,238,243,.28);transition:all .45s cubic-bezier(.16,1,.3,1)}
  .dot:hover{background:rgba(232,238,243,.7);transform:scale(1.25)}
  .dot.on{background:var(--gold);height:22px;border-radius:5px;box-shadow:0 0 12px rgba(201,168,106,.7)}
  .counter{position:fixed;bottom:26px;left:28px;z-index:50;font-variant-numeric:tabular-nums;letter-spacing:.18em;font-size:13px;color:rgba(232,238,243,.55);direction:ltr;display:flex;gap:7px;align-items:baseline}
  .counter .cur{color:var(--gold-soft);font-size:17px}
  .counter .sep{opacity:.4}
  .brand{position:fixed;top:20px;right:26px;z-index:50;font-size:12px;letter-spacing:.34em;color:rgba(232,238,243,.5);text-transform:uppercase;font-weight:300}
  .brand b{color:var(--gold-soft);font-weight:500}
  .scrollhint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;
    color:rgba(232,238,243,.7);font-size:12.5px;letter-spacing:.22em;animation:floaty 2.4s ease-in-out infinite;transition:opacity .8s ease;z-index:40}
  .scrollhint svg{opacity:.85}
  @keyframes floaty{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
  body.scrolled .scrollhint{opacity:0;pointer-events:none}
  @media (max-width:640px){.dots{left:12px;gap:9px}.dot.on{height:18px}.counter{left:14px;bottom:16px;font-size:12px}.brand{right:14px;top:14px;letter-spacing:.26em;font-size:10.5px}.slide{padding:10px}}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.frame{transition:opacity .4s ease;transform:none}.slide.active .frame{transform:none}.scrollhint{animation:none}}
</style>
</head>

<script>
(function(){
  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var dots   = Array.prototype.slice.call(document.querySelectorAll('.dot'));
  var bar=document.getElementById('bar'), curEl=document.getElementById('cur');
  var total=slides.length, active=0;
  function setActive(i){
    if(i===active){slides[i].classList.add('active');return;}
    active=i;
    slides.forEach(function(s,idx){s.classList.toggle('active', idx===i);});
    dots.forEach(function(d,idx){d.classList.toggle('on', idx===i);});
    curEl.textContent=String(i+1).padStart(2,'0');
  }
  var io=new IntersectionObserver(function(entries){
    var best=null,bestRatio=0;
    entries.forEach(function(e){if(e.isIntersecting&&e.intersectionRatio>bestRatio){bestRatio=e.intersectionRatio;best=e.target;}});
    if(best){setActive(slides.indexOf(best));}
  },{threshold:[.25,.5,.75,.9]});
  slides.forEach(function(s){io.observe(s);});
  setActive(0);
  // YouTube facade: inline play when hosted (http/https), open on YouTube when run as a local file
  Array.prototype.slice.call(document.querySelectorAll('.ytbox')).forEach(function(box){
    var id = box.getAttribute('data-yt');
    var btn = box.querySelector('.ytfacade');
    if(!btn) return;
    btn.addEventListener('click', function(){
      if(location.protocol === 'file:'){
        window.open('https://www.youtube.com/watch?v=' + id, '_blank');
        return;
      }
      var f = document.createElement('iframe');
      f.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&modestbranding=1&playsinline=1';
      f.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      f.setAttribute('allowfullscreen','');
      box.innerHTML = '';
      box.appendChild(f);
    });
  });
  function onScroll(){
    var h=document.documentElement.scrollHeight-window.innerHeight;
    var p=h>0?(window.scrollY/h)*100:0;
    bar.style.width=p.toFixed(2)+'%';
    if(window.scrollY>40) document.body.classList.add('scrolled');
  }
  window.addEventListener('scroll',onScroll,{passive:true}); onScroll();
  dots.forEach(function(d){d.addEventListener('click',function(){
    var n=parseInt(d.getAttribute('data-go'),10)-1;
    slides[n].scrollIntoView({behavior:'smooth',block:'center'});
  });});
  function go(delta){var n=Math.min(total-1,Math.max(0,active+delta));slides[n].scrollIntoView({behavior:'smooth',block:'center'});}
  window.addEventListener('keydown',function(e){
    if(/^(INPUT|TEXTAREA|IFRAME)$/.test((e.target&&e.target.tagName)||'')) return;
    switch(e.key){
      case 'ArrowDown':case 'PageDown':case ' ':e.preventDefault();go(1);break;
      case 'ArrowUp':case 'PageUp':e.preventDefault();go(-1);break;
      case 'Home':e.preventDefault();slides[0].scrollIntoView({behavior:'smooth',block:'center'});break;
      case 'End':e.preventDefault();slides[total-1].scrollIntoView({behavior:'smooth',block:'center'});break;
    }
  });
})();
</script>
